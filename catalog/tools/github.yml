id: github
name: "GitHub MCP"
type: mcp
transport: stdio
command: "uvx"
args: ["mcp-server-github"]
env_keys:
  - GITHUB_TOKEN
description: "Read/write GitHub repos, issues, pull requests, file contents, comments."
required_capabilities:
  - secrets:read_env
  - network:http
  - account:github
tags:
  - vcs
  - collaboration
