id: slack
name: "Slack MCP"
type: mcp
transport: stdio
command: "uvx"
args: ["mcp-server-slack"]
env_keys:
  - SLACK_BOT_TOKEN
  - SLACK_TEAM_ID
description: "Post and read messages in Slack channels, list users, react to messages."
required_capabilities:
  - network:http
  - account:slack
tags:
  - communication
