id: pnpm
name: "pnpm"
type: binary
command: "pnpm"
version_check: "pnpm --version"
description: |
  Fast, disk-space-efficient package manager for Node.js. Read-only ops
  (pnpm list, pnpm why) need filesystem:read. Install/update ops need
  filesystem:write and network:http to fetch packages. Publish needs
  network:http and typically secrets:read_env for the registry token.
required_capabilities:
  - shell:execute
tags:
  - package-manager
  - nodejs
