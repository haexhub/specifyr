id: curl
name: "curl"
type: binary
command: "curl"
version_check: "curl --version"
description: |
  HTTP client for ad-hoc requests. Network access is curl's entire purpose,
  so network:http is required. POST/PUT/DELETE additionally need
  network:http. Saving response bodies to disk needs filesystem:write.
required_capabilities:
  - shell:execute
  - network:http
tags:
  - http
  - core
