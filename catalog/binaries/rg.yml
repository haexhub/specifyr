id: rg
name: "ripgrep"
type: binary
command: "rg"
version_check: "rg --version"
description: |
  Recursive grep replacement, very fast. Reading files is rg's entire
  purpose, so filesystem:read is required. No write or network ops.
required_capabilities:
  - shell:execute
  - filesystem:read
tags:
  - search
  - core
