id: glab
name: "GitLab CLI"
type: binary
command: "glab"
version_check: "glab --version"
description: |
  Official GitLab command-line tool. Read-only ops (glab repo view, glab mr list)
  need network:http and account:gitlab. Mutating ops (glab mr create, glab issue create)
  additionally need network:http. Authentication uses secrets:read_env with
  GITLAB_TOKEN set as a project secret.
env_keys:
  - GITLAB_TOKEN   # Personal Access Token for gitlab.com or self-hosted GitLab
nix_package: glab
required_capabilities:
  - shell:execute
  - network:http
tags:
  - vcs
  - gitlab
