id: gh
name: "GitHub CLI"
type: binary
command: "gh"
version_check: "gh --version"
description: |
  Official GitHub command-line tool. Read-only ops (gh repo view, gh pr list)
  need network:http and account:github. Mutating ops (gh pr create, gh
  release upload) additionally need network:http. Authentication uses
  secrets:read_env if a GH_TOKEN is provided. Grant the capabilities matching
  your agent's intended ops.
required_capabilities:
  - shell:execute
tags:
  - vcs
  - github
