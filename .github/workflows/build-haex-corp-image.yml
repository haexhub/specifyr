# Build the haex-corp main image and push it to GitHub Container Registry.
#
# Image is consumed by the production Ansible deployment (roles/haex-corp/
# in the ansible repo) which `docker compose pull`s the tag specified in
# its docker-compose.yml.j2 template (default: `:latest` on default branch,
# or a pinned `:sha-<short>` for reproducible deploys).
#
# Triggers:
#   - push to main that touches the application image inputs (src/, server/,
#     app/, package.json, Dockerfile)
#   - manual dispatch (for cutting tagged releases)
#
# Tags applied (via docker/metadata-action):
#   - ghcr.io/<owner>/haex-corp:latest        (only on default branch)
#   - ghcr.io/<owner>/haex-corp:<branch>      (e.g. main, feature/x)
#   - ghcr.io/<owner>/haex-corp:sha-<short>   (always)
#   - ghcr.io/<owner>/haex-corp:<git-tag>     (only on tag refs)
#
# Security note: this workflow uses only github-native context vars
# (repository_owner, actor, GITHUB_TOKEN) and outputs from the trusted
# docker/metadata-action. No user-controlled inputs (PR titles, commit
# messages, branch names typed into shell) are interpolated into run:
# steps, so workflow-injection per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# does not apply.

name: Build haex-corp image

on:
  push:
    branches:
      - main
      # Default branch today is feature/speckit-company-extension. Listed
      # explicitly so the workflow runs before that work merges into main.
      - feature/speckit-company-extension
    tags:
      - "haex-corp-v*"
    paths:
      - "Dockerfile"
      - "src/**"
      - "server/**"
      - "app/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "nuxt.config.ts"
      - "tsconfig.json"
      - ".github/workflows/build-haex-corp-image.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/haex-corp
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (prod target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
