# Build the specifyr main image and push it to GitHub Container Registry.
#
# Image is consumed by the production Ansible deployment (roles/specifyr/
# in the ansible repo) which pulls `ghcr.io/<owner>/specifyr:latest`. The
# `haex-watchtower` role re-pulls labeled containers every 5 min, so any
# advance of `:latest` rolls out automatically on haex.cloud.
#
# Triggers:
#   - push to main that touches the application image inputs (src/, server/,
#     app/, package.json, Dockerfile) → builds & publishes :main + :sha-<x>
#     for verification. Does NOT advance :latest, so prod is unaffected.
#   - tag push `v*` (cut by release-please when a Release-PR is merged) →
#     builds & publishes :vX.Y.Z, :X.Y.Z, :X.Y, :X, AND advances :latest →
#     watchtower picks it up on the next 5-min poll and rolls out.
#   - manual dispatch (escape hatch)
#
# Tags applied (via docker/metadata-action):
#   - ghcr.io/<owner>/specifyr:latest        (release tag only)
#   - ghcr.io/<owner>/specifyr:main          (push to main)
#   - ghcr.io/<owner>/specifyr:sha-<short>   (always)
#   - ghcr.io/<owner>/specifyr:vX.Y.Z        (tag refs, raw)
#   - ghcr.io/<owner>/specifyr:X.Y.Z         (tag refs, semver)
#   - ghcr.io/<owner>/specifyr:X.Y / :X      (tag refs, semver)
#
# Security note: this workflow uses only github-native context vars
# (repository_owner, actor, GITHUB_TOKEN) and outputs from the trusted
# docker/metadata-action. No user-controlled inputs (PR titles, commit
# messages, branch names typed into shell) are interpolated into run:
# steps, so workflow-injection per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# does not apply.

name: Build specifyr image

on:
  push:
    branches:
      - main
    # Tags are produced by release-please (see release-please.yml) once a
    # Release-PR is merged. Pattern matches release-please's default
    # `v<MAJOR>.<MINOR>.<PATCH>` (release-please-config.json sets
    # include-v-in-tag: true, include-component-in-tag: false).
    tags:
      - "v*"
    paths:
      - "Dockerfile"
      - "src/**"
      - "server/**"
      - "app/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "nuxt.config.ts"
      - "tsconfig.json"
      - ".github/workflows/build-specifyr-image.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation for arm64 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/specifyr
          # `:latest` advances ONLY on a release tag (`v*`). Pushes to main
          # build & publish `:main` + `:sha-<short>` for verification but
          # explicitly do NOT move `:latest` — Watchtower on haex.cloud polls
          # `:latest`, so prod stays pinned to the last cut release until
          # release-please's PR is merged and a `vX.Y.Z` tag is pushed.
          # `type=semver` extracts the bare version from `v1.2.3` tags so
          # consumers can pin :1, :1.2, or :1.2.3.
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push (prod target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
