# Build the hermes-agent runtime image and push it to GitHub Container Registry.
#
# Image is consumed by src/runners/hermes-docker.js as the per-agent
# container. Default tag in code is `hermes-agent:dev` for local builds —
# pulling from GHCR uses the `ghcr.io/<owner>/hermes-agent:<tag>` form.
#
# Triggers:
#   - push to main that touches the agent image inputs (Dockerfile,
#     entrypoint, catalog binary list)
#   - manual dispatch (for cutting tagged releases)
#
# Tags applied (via docker/metadata-action):
#   - ghcr.io/<owner>/hermes-agent:latest        (only on default branch)
#   - ghcr.io/<owner>/hermes-agent:<branch>      (e.g. main, feature/x)
#   - ghcr.io/<owner>/hermes-agent:sha-<short>   (always)
#   - ghcr.io/<owner>/hermes-agent:<git-tag>     (only on tag refs)
#
# Security note: this workflow uses only github-native context vars
# (repository_owner, actor, GITHUB_TOKEN) and outputs from the trusted
# docker/metadata-action. No user-controlled inputs (PR titles, commit
# messages, branch names typed into shell) are interpolated into run:
# steps, so workflow-injection per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# does not apply.

name: Build hermes-agent image

on:
  push:
    branches:
      - main
    tags:
      - "hermes-agent-v*"
    paths:
      - "Dockerfile.hermes-agent"
      - "src/runners/hermes-agent-entrypoint.sh"
      - "catalog/binaries/**"
      - ".github/workflows/build-hermes-agent-image.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation for arm64 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/hermes-agent
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hermes-agent
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache via GHA cache backend — reuses base layers across runs.
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
