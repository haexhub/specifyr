schema_version: "1.0"

extension:
  id: haex-paperclip
  name: "Paperclip Workflow"
  version: "0.1.0"
  description: "Goal-driven AI-agent orchestration inspired by Paperclip: goals, org-chart, heartbeats, budgets."
  author: "haex"
  repository: "https://github.com/haex/spec-kit-haex-paperclip"
  license: MIT
  homepage: "https://github.com/haex/spec-kit-haex-paperclip"

requires:
  speckit_version: ">=0.2.0"
  tools:
    - name: yq
      required: true
      version: ">=4.0.0"
    - name: jq
      required: true
      version: ">=1.6"

provides:
  commands:
    - name: speckit.haex-paperclip.goal
      file: commands/speckit.haex-paperclip.goal.md
      description: "Create, list, or inspect long-running business goals"
    - name: speckit.haex-paperclip.org
      file: commands/speckit.haex-paperclip.org.md
      description: "Manage the org-chart: add/remove roles and map them to providers"
    - name: speckit.haex-paperclip.heartbeat
      file: commands/speckit.haex-paperclip.heartbeat.md
      description: "Run one heartbeat tick: check goals, enforce budgets, delegate work"
    - name: speckit.haex-paperclip.budget
      file: commands/speckit.haex-paperclip.budget.md
      description: "View, set, or reset agent budgets and record cost events"
    - name: speckit.haex-paperclip.dashboard
      file: commands/speckit.haex-paperclip.dashboard.md
      description: "Status overview of goals, agents, budget usage, and recent activity"

  config:
    - name: "haex-paperclip-config.yml"
      template: "config-template.yml"
      description: "Org chart, providers, budgets, and delegation policy"
      required: true

hooks:
  after_specify:
    command: speckit.haex-paperclip.goal
    optional: true
    prompt: "Attach this spec to a Paperclip goal?"
    description: "Link generated spec to a long-running goal"
  after_tasks:
    command: speckit.haex-paperclip.heartbeat
    optional: true
    prompt: "Run a heartbeat tick to delegate new tasks?"
    description: "Auto-delegate tasks to roles defined in the org chart"
  before_implement:
    command: speckit.haex-paperclip.budget
    optional: false
    description: "Check active budget before implementation starts"
  after_implement:
    command: speckit.haex-paperclip.budget
    optional: false
    description: "Record cost of the implementation run against the budget"

tags:
  - "orchestration"
  - "multi-agent"
  - "haex-paperclip"
  - "budget"
  - "scheduler"

defaults:
  heartbeat:
    # Default step order when /speckit.haex-paperclip.heartbeat runs.
    # Users can reorder or disable steps in haex-paperclip-config.yml::heartbeat.steps.
    steps:
      - goals_refresh
      - budget_check
      - delegate_pending
      - cost_report
