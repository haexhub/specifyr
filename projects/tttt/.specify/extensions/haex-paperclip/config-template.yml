# Paperclip Workflow — configuration template
#
# Copy this to `.specify/extensions/haex-paperclip/haex-paperclip-config.yml` after
# running `specify extension add haex-paperclip`, then fill in the values for
# your organization. Nothing here has a default value — every field below
# reflects a decision you need to make.
#
# Environment variables override any leaf value using the pattern
# SPECKIT_HAEX_PAPERCLIP_<UPPER_SNAKE_PATH>.

# ---------------------------------------------------------------------------
# 1. Org chart
# ---------------------------------------------------------------------------
# Each role requires:
#   id               lowercase slug, referenced elsewhere
#   title            human-readable label
#   reports_to       id of parent role, or null for top of chart
#   responsibilities array of spec-kit stage names this role owns
#                    (specify, clarify, plan, tasks, implement, analyze, checklist)
org:
  company: ""
  roles: []
  # Example shape:
  # roles:
  #   - id: ceo
  #     title: "Chief Executive"
  #     reports_to: null
  #     responsibilities: ["strategy"]
  #   - id: engineer
  #     title: "Engineer"
  #     reports_to: ceo
  #     responsibilities: ["implement"]

# ---------------------------------------------------------------------------
# 2. Providers
# ---------------------------------------------------------------------------
# `catalog` lists adapter scripts shipped with this extension.
# `bindings` maps role id -> provider name. Every role you declare above
# needs a binding or it cannot be delegated to.
providers:
  catalog:
    - name: claude
      adapter: "providers/claude.sh"
    - name: codex
      adapter: "providers/codex.sh"
    - name: http
      adapter: "providers/http.sh"
  bindings: {}
  # Example:
  # bindings:
  #   ceo: claude
  #   engineer: codex

# ---------------------------------------------------------------------------
# 3. Delegation
# ---------------------------------------------------------------------------
# Which role handles which spec-kit stage. Referenced by the
# `delegate_pending` heartbeat step and by the `after_tasks` hook.
# Leave a stage unmapped to disable auto-delegation for it.
delegation:
  stage_to_role: {}
  # Example:
  # stage_to_role:
  #   specify: product-manager
  #   plan:    architect
  #   tasks:   engineering-lead
  #   implement: engineer
  #   analyze: qa

# ---------------------------------------------------------------------------
# 4. Budgets
# ---------------------------------------------------------------------------
# Per-role caps and enforcement thresholds. No defaults — if a role is not
# listed here, `/speckit.haex-paperclip.budget check` reports "unconfigured" and
# the `before_implement` hook prompts you to set one before proceeding.
#
# Schema:
#   budgets:
#     per_role:
#       <role-id>:
#         monthly_limit_eur: number
#         daily_limit_eur:   number   (optional)
#         thresholds:                  (ordered list, highest matching wins)
#           - at:   float              (fraction of monthly_limit_eur)
#             mode: warn | throttle | block | escalate
#             throttle_seconds: int    (required only when mode=throttle)
#
# Modes:
#   warn     — write warning to stderr, continue
#   throttle — sleep N seconds, continue
#   block    — refuse the run (exit 2)
#   escalate — emit `escalation.requested` event, require human approval
budgets:
  per_role: {}

# ---------------------------------------------------------------------------
# 5. Heartbeat tuning
# ---------------------------------------------------------------------------
# Safety rails for cron-driven invocation. Override the default step list
# from extension.yml here if you want a different sequence.
heartbeat:
  min_interval_seconds: null   # integer seconds; null = no rate-limiting
  goal_filter: "active"        # "active" | "all"
  # steps: [goals_refresh, budget_check, delegate_pending, cost_report]
