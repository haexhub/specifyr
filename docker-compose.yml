# Development compose — Nuxt dev server with HMR.
#
# Usage:
#   docker compose up --build            # start dev server on http://localhost:3000
#   docker compose exec haex-corp sh     # shell inside the running container
#
# Authentifizierung gegen Anthropic (Solo-Tool-Setup):
#   - Default: Host-Login wird per Bind-Mount (~/.claude) wiederverwendet. Kein zusätzlicher
#     Login im Container nötig — der Container sieht genau das, was dein Host-`claude` sieht.
#   - API-Key: Alternativ/ergänzend ANTHROPIC_API_KEY in .env oder Shell setzen.
#   - Multi-User später: Statt des Bind-Mounts ein benanntes Volume einhängen und
#     `docker compose exec haex-corp claude login` pro Setup ausführen. Siehe Kommentar
#     an der volumes-Zeile unten.

services:
  haex-corp:
    build:
      context: .
      target: dev
    image: haex-corp:dev
    container_name: haex-corp-dev
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: development
      # Optional: falls gesetzt, nutzt `claude` diesen Key statt OAuth.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Image-Tag, mit dem hermes-docker.js Agenten-Container spawnt. Default
      # 'hermes-agent:dev' = lokal selbst gebaut. Für GHCR-Konsum: setze
      # `HERMES_AGENT_IMAGE=ghcr.io/<owner>/hermes-agent:<tag>` in der Shell
      # vor `docker compose up`, oder hardcode hier.
      HERMES_AGENT_IMAGE: ${HERMES_AGENT_IMAGE:-hermes-agent:dev}
      # Host-Pfad zu diesem Repo (= Host-Equivalent von /app im Container).
      # Wird gebraucht, wenn haex-corp via /var/run/docker.sock Sibling-Container
      # spawnt: deren Bind-Mount-Sources werden vom Host-Daemon aufgelöst, nicht
      # gegen das Container-FS. Default `${PWD}` (`docker compose` setzt das auf
      # das Verzeichnis der compose-Datei) — passt für das Standard-Setup.
      # Wenn haex-corp nativ auf dem Host läuft, kann diese Variable leer bleiben.
      HAEX_CORP_HOST_PROJECT_ROOT: ${HAEX_CORP_HOST_PROJECT_ROOT:-${PWD}}
    volumes:
      # Source bind mount für HMR.
      - .:/app
      # Anonymous volumes verhindern, dass Host-node_modules/Nuxt-Caches die Container-
      # Versionen überschreiben (Alpine-Binaries vs. glibc-Host-Binaries).
      - /app/node_modules
      - /app/.nuxt
      - /app/.output
      # Host-Login wiederverwenden (Solo-Tool-Default). Für Multi-User später austauschen gegen:
      #   - claude_home:/home/node/.claude
      # und das `volumes:`-Block unten einkommentieren + `claude login` im Container ausführen.
      - ${HOME}/.claude:/home/node/.claude
      # Docker-Socket: erlaubt der haex-corp-App, per `docker run` Hermes-Agent-Container
      # zu spawnen. SICHERHEITS-HINWEIS: dieser Mount = effektiv root auf dem Host für
      # alles innerhalb dieses Containers. Acceptabel für Solo-Dev-Setup; in Multi-User-
      # /Cloud-Deployments stattdessen einen privilegierten Sidecar oder rootless-docker
      # erwägen. Wir mounten rw, weil `docker run` schreibend auf den Socket zugreifen muss.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      # haex-corp und alle gespawnten Hermes-Agent-Container teilen sich dieses
      # benutzerdefinierte Bridge-Network. Agenten erreichen die Orchestrator-API
      # als http://haex-corp:3000.
      - companies
    # UID/GID-Mapping für Bind-Mounts (Linux). Auf macOS/Windows ignoriert Docker das.
    # Falls dein Host-User nicht UID 1000 hat: `UID=$(id -u) GID=$(id -g) docker compose up`
    user: "${UID:-1000}:${GID:-1000}"

networks:
  companies:
    name: companies
    driver: bridge

# Multi-User-Zukunft: benanntes Volume statt Host-Mount.
# volumes:
#   claude_home:
