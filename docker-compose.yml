# Development compose — Nuxt dev server with HMR.
#
# Usage:
#   docker compose up --build            # start dev server on http://localhost:3000
#   docker compose exec speculoss sh     # shell inside the running container
#
# Authentifizierung gegen Anthropic (Solo-Tool-Setup):
#   - Default: Host-Login wird per Bind-Mount (~/.claude) wiederverwendet. Kein zusätzlicher
#     Login im Container nötig — der Container sieht genau das, was dein Host-`claude` sieht.
#   - API-Key: Alternativ/ergänzend ANTHROPIC_API_KEY in .env oder Shell setzen.
#   - Multi-User später: Statt des Bind-Mounts ein benanntes Volume einhängen und
#     `docker compose exec speculoss claude login` pro Setup ausführen. Siehe Kommentar
#     an der volumes-Zeile unten.

services:
  speculoss:
    build:
      context: .
      target: dev
    image: speculoss:dev
    container_name: speculoss-dev
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: development
      # Optional: falls gesetzt, nutzt `claude` diesen Key statt OAuth.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Image-Tag, mit dem hermes-docker.js Agenten-Container spawnt. Default
      # 'hermes-agent:dev' = lokal selbst gebaut. Für GHCR-Konsum: setze
      # `HERMES_AGENT_IMAGE=ghcr.io/<owner>/hermes-agent:<tag>` in der Shell
      # vor `docker compose up`, oder hardcode hier.
      HERMES_AGENT_IMAGE: ${HERMES_AGENT_IMAGE:-hermes-agent:dev}
      # Pfade zum Laufzeit-Datenverzeichnis (~/.speculoos). Im Container liegt es
      # unter /data; der Docker-Daemon löst Bind-Mount-Sources gegen das HOST-FS auf,
      # daher muss SPECULOOS_HOST_DATA_DIR auf den Host-Pfad zeigen.
      SPECULOOS_DATA_DIR: /data
      SPECULOOS_HOST_DATA_DIR: ${SPECULOOS_HOST_DATA_DIR:-${HOME}/.speculoos}
      # Host-Pfad zu diesem Repo (= Host-Equivalent von /app im Container).
      # Wird gebraucht, wenn speculoss via /var/run/docker.sock Sibling-Container
      # spawnt: deren Bind-Mount-Sources werden vom Host-Daemon aufgelöst, nicht
      # gegen das Container-FS. Default `${PWD}` — passt für das Standard-Setup.
      SPECULOSS_HOST_PROJECT_ROOT: ${SPECULOSS_HOST_PROJECT_ROOT:-${PWD}}
      # Approval-Notification: Telegram-Channel. Falls beide Vars gesetzt sind,
      # registriert start.post.ts einen TelegramTransport. Sonst No-op-Fallback.
      # Werte landen in `.env` (gitignored), Setup-Anleitung steht in
      # `.env.example`.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # Optional: Deep-Link-Base. Ohne den ist die Telegram-Nachricht rein
      # informativ; mit Wert wird `<base>/approvals/<id>` als klickbarer Link
      # ergänzt.
      APPROVAL_URL_BASE: ${APPROVAL_URL_BASE:-}
      # URL des lokalen claude-proxy-Containers. Wenn gesetzt, routen alle
      # Hermes-Agenten ihre Anthropic-API-Calls darüber (nutzt Claude-Abo-OAuth).
      COMPANY_CLAUDE_PROXY_URL: http://claude-proxy:8080
    volumes:
      # Source bind mount für HMR.
      - .:/app
      # Laufzeit-Daten (Projekte, Extensions, Stores) außerhalb des Code-Verzeichnisses.
      - ${HOME}/.speculoos:/data
      # Anonymous volumes verhindern, dass Host-node_modules/Nuxt-Caches die Container-
      # Versionen überschreiben (Alpine-Binaries vs. glibc-Host-Binaries).
      - /app/node_modules
      - /app/.nuxt
      - /app/.output
      # Host-Login wiederverwenden (Solo-Tool-Default). Für Multi-User später austauschen gegen:
      #   - claude_home:/home/node/.claude
      # und das `volumes:`-Block unten einkommentieren + `claude login` im Container ausführen.
      - ${HOME}/.claude:/home/node/.claude
      # Docker-Socket: erlaubt der speculoss-App, per `docker run` Hermes-Agent-Container
      # zu spawnen. SICHERHEITS-HINWEIS: dieser Mount = effektiv root auf dem Host für
      # alles innerhalb dieses Containers. Acceptabel für Solo-Dev-Setup; in Multi-User-
      # /Cloud-Deployments stattdessen einen privilegierten Sidecar oder rootless-docker
      # erwägen. Wir mounten rw, weil `docker run` schreibend auf den Socket zugreifen muss.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      # speculoss und alle gespawnten Hermes-Agent-Container teilen sich dieses
      # benutzerdefinierte Bridge-Network. Agenten erreichen die Orchestrator-API
      # als http://speculoss:3000. Der alte Alias bleibt fuer bestehende Setups.
      companies:
        aliases:
          - speculoss
          - haex-corp
    # UID/GID-Mapping für Bind-Mounts (Linux). Auf macOS/Windows ignoriert Docker das.
    # Falls dein Host-User nicht UID 1000 hat: `UID=$(id -u) GID=$(id -g) docker compose up`
    user: "${UID:-1000}:${GID:-1000}"
    # Docker-Socket-Gruppe: erlaubt dem node-User im Container, den gemounteten
    # Docker-Socket zu nutzen. DOCKER_GID auf die Host-GID der docker-Gruppe setzen
    # (Standard: 999 auf Ubuntu/Debian). `getent group docker | cut -d: -f3` liefert den Wert.
    group_add:
      - "${DOCKER_GID:-999}"

  claude-proxy:
    image: haex-claude-proxy:dev
    container_name: claude-proxy
    volumes:
      - ${HOME}/.claude:/home/node/.claude:ro
      - ${HOME}/.claude.json:/home/node/.claude.json:ro
    networks:
      - companies
    restart: unless-stopped

networks:
  companies:
    name: companies
    driver: bridge

# Multi-User-Zukunft: benanntes Volume statt Host-Mount.
# volumes:
#   claude_home:



