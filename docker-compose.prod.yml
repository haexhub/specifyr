# Production compose — baut das prod-Stage-Image und startet den Nitro-Server.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d
#   docker compose -f docker-compose.prod.yml logs -f
#
# Unterschied zu dev:
#   - Image-Target `prod` statt `dev` (kein pnpm dev, kein HMR).
#   - Kein Source-Bind-Mount; nur Runtime-Daten (projects/, .specops/, Credentials) werden
#     reingereicht. Alles andere ist in der Image-Schicht eingefroren.

services:
  haex-corp:
    build:
      context: .
      target: prod
    image: haex-corp:prod
    container_name: haex-corp-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Prod-Default: pinned GHCR-Image. Vor `docker compose up` setzen, z.B.
      #   HERMES_AGENT_IMAGE=ghcr.io/haexhub/hermes-agent:sha-abc1234 docker compose -f docker-compose.prod.yml up
      # Ohne expliziten Wert nimmt die Compose-Substitution `:latest` auf der
      # Default-Branch — nur sinnvoll, wenn deployment-stabilität zweitrangig ist.
      HERMES_AGENT_IMAGE: ${HERMES_AGENT_IMAGE:-ghcr.io/haexhub/hermes-agent:latest}
    volumes:
      # Multi-Projekt-Arbeitsbereich: Host-projects/ wird eingehängt, damit Runs am echten
      # Repo arbeiten. Entferne den Mount, wenn du projects/ stattdessen im Container-Volume
      # halten willst.
      - ./projects:/app/projects
      # Event-/Session-State soll persistieren, ohne den Host zu verschmutzen.
      - specops_state:/app/.specops
      # Host-Login wiederverwenden (Solo-Tool-Default). Für Multi-User später:
      #   - claude_home:/home/node/.claude
      - ${HOME}/.claude:/home/node/.claude
      # Docker-Socket: gleiche Begründung wie in docker-compose.yml — erlaubt
      # `docker run` von innen, um Hermes-Agent-Container zu spawnen. Effektiv
      # Host-root für diesen Container; in Multi-User-Deployments revisiten.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - companies
    user: "${UID:-1000}:${GID:-1000}"

networks:
  companies:
    name: companies
    driver: bridge

volumes:
  specops_state:
  # Multi-User-Zukunft:
  # claude_home:
